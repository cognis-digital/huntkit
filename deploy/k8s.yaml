apiVersion: apps/v1
kind: Deployment
metadata: { name: sentrylog, labels: { app: sentrylog } }
spec:
  replicas: 1
  selector: { matchLabels: { app: sentrylog } }
  template:
    metadata: { labels: { app: sentrylog } }
    spec:
      containers:
        - name: sentrylog
          image: ghcr.io/cognis-digital/sentrylog:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: sentrylog }
spec:
  selector: { app: sentrylog }
  ports: [{ port: 80, targetPort: 8000 }]
